name: AutoOps Contract Verification

on: [push, pull_request]

jobs:
  verify-contracts:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Cache pip
        uses: actions/cache@v3
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('backend/requirements.txt') }}

      - name: Install dependencies
        run: pip install -r backend/requirements.txt

      - name: Set environment variables
        run: |
          echo "DEMO_MODE=TRUE" >> $GITHUB_ENV
          echo "WEBHOOK_SECRET=dummy" >> $GITHUB_ENV
          echo "GROQ_API_KEY=dummy" >> $GITHUB_ENV
          echo "RESEND_API_KEY=dummy" >> $GITHUB_ENV
          echo "ANTHROPIC_API_KEY=dummy" >> $GITHUB_ENV

      - name: Run Verification
        run: |
          cd backend
          python verify.py